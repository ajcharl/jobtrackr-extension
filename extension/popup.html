<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobTrackr</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      width:340px;
      min-height:420px;
      font-family:Inter, Arial, sans-serif;
      background:linear-gradient(180deg, #eef4ff 0%, #f8fafc 100%);
      color:#0f172a;
    }

    .container{
      padding:18px;
    }

    .top-card{
      position:relative;
      overflow:hidden;
      background:linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
      color:white;
      border-radius:20px;
      padding:18px;
      box-shadow:0 16px 30px rgba(37, 99, 235, 0.25);
      margin-bottom:16px;
    }

    .top-card::before{
      content:"";
      position:absolute;
      width:120px;
      height:120px;
      border-radius:50%;
      background:rgba(255,255,255,0.12);
      top:-35px;
      right:-25px;
    }

    .top-card::after{
      content:"";
      position:absolute;
      width:90px;
      height:90px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      bottom:-30px;
      left:-20px;
    }

    .brand{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .logo{
      width:40px;
      height:40px;
      border-radius:12px;
      background:rgba(255,255,255,0.18);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      backdrop-filter:blur(6px);
    }

    .brand-text h1{
      margin:0;
      font-size:20px;
      font-weight:800;
      letter-spacing:-0.3px;
    }

    .brand-text p{
      margin:2px 0 0;
      font-size:12px;
      opacity:0.9;
    }

    .hero-text{
      position:relative;
      z-index:1;
      margin-top:10px;
    }

    .hero-text h2{
      margin:0 0 6px;
      font-size:16px;
      font-weight:700;
      line-height:1.35;
    }

    .hero-text p{
      margin:0;
      font-size:12px;
      line-height:1.5;
      color:rgba(255,255,255,0.9);
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:14px;
    }

    .card{
      background:rgba(255,255,255,0.85);
      border:1px solid rgba(255,255,255,0.7);
      backdrop-filter:blur(10px);
      border-radius:16px;
      padding:14px;
      box-shadow:0 8px 20px rgba(15, 23, 42, 0.06);
    }

    .label{
      font-size:11px;
      color:#64748b;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:0.6px;
      font-weight:700;
    }

    .value{
      font-size:22px;
      font-weight:800;
      color:#111827;
      line-height:1;
      margin-bottom:4px;
    }

    .subtext{
      font-size:12px;
      color:#6b7280;
    }

    .section-card{
      background:white;
      border-radius:18px;
      padding:14px;
      box-shadow:0 10px 24px rgba(15, 23, 42, 0.08);
      border:1px solid #e5e7eb;
      margin-bottom:14px;
    }

    .section-title{
      font-size:13px;
      font-weight:800;
      color:#111827;
      margin-bottom:10px;
    }

    .activity{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px solid #eef2f7;
    }

    .activity:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .activity-left{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow:0 0 0 5px rgba(37, 99, 235, 0.08);
    }

    .activity-text{
      font-size:13px;
      color:#1f2937;
      font-weight:600;
    }

    .activity-time{
      font-size:11px;
      color:#94a3b8;
    }

    a{
      text-decoration:none;
    }

    button{
      width:100%;
      border:none;
      border-radius:14px;
      padding:13px 14px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:all 0.22s ease;
    }

    .dashboard{
      background:linear-gradient(135deg, #111827 0%, #1f2937 100%);
      color:white;
      box-shadow:0 10px 18px rgba(17, 24, 39, 0.22);
    }

    .dashboard:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 24px rgba(17, 24, 39, 0.28);
    }

    .dashboard:active{
      transform:translateY(0);
    }

    .footer-note{
      text-align:center;
      font-size:11px;
      color:#94a3b8;
      margin-top:10px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="top-card">
      <div class="brand">
        <div class="logo">💼</div>
        <div class="brand-text">
          <h1>JobTrackr</h1>
          <p>Track smarter, apply better</p>
        </div>
      </div>

      <div class="hero-text">
        <h2>Stay on top of your job search.</h2>
        <p>Organize applications, monitor progress, and open your dashboard in one click.</p>
      </div>
    </div>

    <div class="section-card" id="job-card">
      <div class="section-title">Detected Job</div>
      <div style="margin-bottom:6px;">
        <span class="label">Title</span>
        <div id="title" style="font-size:14px;font-weight:700;color:#111827;">—</div>
      </div>
      <div style="margin-bottom:6px;">
        <span class="label">Company</span>
        <div id="company" style="font-size:14px;font-weight:700;color:#111827;">—</div>
      </div>
      <div style="margin-bottom:10px;">
        <span class="label">Source</span>
        <div id="source" style="font-size:13px;color:#6b7280;">—</div>
      </div>
      <button id="saveBtn" style="background:linear-gradient(135deg,#2563eb,#4f46e5);color:white;box-shadow:0 8px 16px rgba(37,99,235,0.22);">Save Job</button>
    </div>

    <a href="dashboard.html" target="_blank">
      <button class="dashboard">Open Dashboard</button>
    </a>

    <div class="footer-note">Built for a cleaner job hunt ✨</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
